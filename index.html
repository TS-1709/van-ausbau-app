<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Roadtrip"><title>🚐 Europa Roadtrip</title><style>
:root {
  --bg: #0a0a0a;
  --c1: rgba(28,28,30,0.82);
  --c2: rgba(44,44,46,0.6);
  --c3: rgba(58,58,60,0.4);
  --bdr: rgba(255,255,255,0.08);
  --t: #f5f5f7;
  --t2: rgba(245,245,247,0.55);
  --blue: #0a84ff;
  --green: #30d158;
  --red: #ff453a;
  --orange: #ff9f0a;
  --yellow: #ffd60a;
  --purple: #bf5af2;
  --teal: #64d2ff;
  --pink: #ff6482;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
  background: var(--bg);
  color: var(--t);
  padding: 0 16px;
  padding-bottom: 88px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(10,132,255,0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(191,90,242,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
body > * { position: relative; z-index: 1; }

/* Tabs */
.tabs {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  display: flex;
  background: rgba(10,10,10,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid rgba(255,255,255,0.08);
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.tab {
  flex: 1; padding: 6px 0 4px; text-align: center;
  font-size: 10px; color: var(--t2); cursor: pointer;
  border: none; background: none; font-weight: 500;
  transition: color 0.2s;
}
.tab .ico { font-size: 22px; display: block; margin-bottom: 0px; }
.tab.on { color: var(--blue); }
.tab.on .ico { transform: scale(1.1); }

/* Pages */
.pg { display: none; padding-bottom: 20px; animation: fadeIn 0.25s ease; }
.pg.on { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* Header */
.hdr {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,10,10,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  margin: 0 -16px; padding: 12px 16px 16px;
}
.hdr h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.8px; }
.hdr .sub { font-size: 13px; color: var(--t2); margin-top: 2px; }
.sync-dot {
  position: absolute; top: 16px; right: 16px;
  width: 8px; height: 8px; border-radius: 50%;
  transition: background 0.3s;
}
.sync-dot.ok { background: var(--green); box-shadow: 0 0 8px rgba(48,209,88,0.4); }
.sync-dot.fail { background: var(--red); box-shadow: 0 0 8px rgba(255,69,58,0.4); }

/* Glass Card */
.glass {
  background: var(--c1);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--bdr);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 12px;
}

/* Budget */
.budget-header { display: flex; justify-content: space-between; align-items: flex-start; }
.budget-label { font-size: 11px; color: var(--t2); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.budget-value { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-top: 2px; font-variant-numeric: tabular-nums; }
.budget-remain { text-align: right; }
.budget-bar {
  height: 8px; background: rgba(255,255,255,0.06);
  border-radius: 4px; margin-top: 16px; overflow: hidden;
}
.budget-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-top: 16px;
}
.stat-card {
  text-align: center; padding: 12px 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.04);
}
.stat-val { font-size: 18px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--t2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Segment Control */
.seg {
  display: flex; background: rgba(255,255,255,0.06);
  border-radius: 12px; padding: 3px; margin: 12px 0;
}
.seg button {
  flex: 1; padding: 8px 0; border: none; background: transparent;
  color: var(--t2); font-size: 13px; font-weight: 600;
  border-radius: 9px; cursor: pointer; transition: all 0.25s;
}
.seg button.on {
  background: var(--blue); color: white;
  box-shadow: 0 2px 8px rgba(10,132,255,0.3);
}

/* Category */
.cat-section { margin-top: 14px; }
.cat-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 4px; cursor: pointer; user-select: none;
  border-radius: 8px; transition: background 0.15s;
}
.cat-header:active { background: rgba(255,255,255,0.04); }
.cat-name { font-size: 16px; font-weight: 700; }
.cat-total {
  font-size: 15px; font-weight: 700; color: var(--t2);
  font-variant-numeric: tabular-nums;
}
.chevron {
  color: var(--t2); font-size: 12px;
  transition: transform 0.25s ease; margin-left: 6px;
  display: inline-block;
}
.cat-header.open .chevron { transform: rotate(90deg); }
.cat-items { overflow: hidden; transition: max-height 0.3s ease; }

/* Item Row */
.item-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 12px; margin: 2px 0;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.item-row:active { transform: scale(0.98); background: rgba(255,255,255,0.06); }
.check-circle {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.check-circle.done {
  background: var(--green); border-color: var(--green);
  box-shadow: 0 2px 8px rgba(48,209,88,0.3);
}
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 16px; font-weight: 500; }
.item-meta {
  font-size: 12px; color: var(--t2); margin-top: 3px;
  display: flex; gap: 6px; align-items: center;
}
.item-price {
  font-size: 18px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 70px; text-align: right;
}
.item-price.unpaid { color: var(--orange); }
.item-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
}
.badge-paid { background: rgba(48,209,88,0.15); color: var(--green); }
.badge-open { background: rgba(255,159,10,0.15); color: var(--orange); }

/* Task Row */
.task-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 12px; margin: 2px 0;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 16px;
}
.task-row.done .task-text { color: var(--t2); text-decoration: line-through; }
.task-body { flex: 1; }
.task-text { font-size: 16px; line-height: 1.4; }
.task-who {
  font-size: 12px; font-weight: 600; margin-top: 4px;
  display: inline-block; padding: 2px 8px; border-radius: 8px;
}
.who-tobi { background: rgba(10,132,255,0.12); color: var(--blue); }
.who-pauline { background: rgba(191,90,242,0.12); color: var(--purple); }
.who-noel { background: rgba(100,210,255,0.12); color: var(--teal); }
.who-raphael { background: rgba(255,100,130,0.12); color: var(--pink); }

/* Who Filter */
.filter-bar {
  display: flex; gap: 8px; margin: 10px 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding: 2px 0;
}
.filter-chip {
  padding: 7px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: transparent; color: var(--t2);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all 0.2s;
}
.filter-chip.on { border-color: var(--blue); background: rgba(10,132,255,0.12); color: var(--blue); }

/* Packlist */
.pk-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 20px; padding: 18px; margin-top: 12px;
}
.pk-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.pk-title { font-size: 17px; font-weight: 700; }
.pk-count { font-size: 13px; color: var(--t2); }
.pk-members { display: flex; gap: 4px; margin-bottom: 10px; }
.pk-member-tag {
  padding: 3px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
  background: rgba(191,90,242,0.1); color: var(--purple);
}
.pk-progress { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.pk-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
.pk-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05);
}
.pk-item:last-child { border: none; }
.pk-check {
  width: 24px; height: 24px; border-radius: 7px;
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.pk-check.on { background: var(--green); border-color: var(--green); box-shadow: 0 2px 6px rgba(48,209,88,0.25); }
.pk-item-text { font-size: 15px; flex: 1; }
.pk-item.packed .pk-item-text { color: var(--t2); text-decoration: line-through; }

/* Country Card */
.country-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 20px; padding: 18px; margin-bottom: 10px;
}
.country-name { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
.country-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
.country-row:last-child { border: none; }
.country-label { font-weight: 600; min-width: 80px; color: var(--t2); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.country-value { flex: 1; font-size: 14px; line-height: 1.4; }
.emergency { color: var(--red); font-weight: 700; font-size: 16px; }

/* Add Row */
.add-row {
  display: flex; gap: 8px; margin-top: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px; padding: 6px;
}
.add-row input {
  flex: 1; padding: 12px 14px;
  background: transparent; border: none;
  color: var(--t); font-size: 16px; font-family: inherit;
}
.add-row input:focus { outline: none; }
.add-row input::placeholder { color: var(--t2); }
.add-row input[type="number"] { max-width: 80px; text-align: right; }
.add-btn {
  padding: 12px 18px; background: var(--green);
  color: white; border: none; border-radius: 12px;
  font-size: 18px; font-weight: 700; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.add-btn:active { transform: scale(0.92); box-shadow: 0 2px 12px rgba(48,209,88,0.3); }

/* Category Selector */
.cat-select-row {
  display: flex; gap: 8px; margin-top: 8px; align-items: center;
}
.cat-select {
  flex: 1; padding: 10px 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--t); font-size: 14px;
  -webkit-appearance: none; font-family: inherit;
}
.new-cat-btn {
  padding: 10px 14px; background: rgba(255,255,255,0.06);
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 12px; color: var(--t2); font-size: 13px;
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.new-cat-btn:active { background: rgba(255,255,255,0.1); }

/* Notes */
.notes-area {
  width: 100%; min-height: 180px; padding: 16px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px; color: var(--t);
  font-size: 16px; font-family: inherit; resize: vertical;
  line-height: 1.6;
}
.notes-area:focus { outline: none; border-color: var(--blue); }

/* Settings Fields */
.settings-group { margin-top: 20px; padding-top: 16px; border-top: 0.5px solid rgba(255,255,255,0.08); }
.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 12px; color: var(--t2);
  margin-bottom: 6px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.field input, .field textarea {
  width: 100%; padding: 14px 16px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; color: var(--t); font-size: 16px;
  font-family: inherit; -webkit-appearance: none;
  transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--blue); }

/* Buttons */
.btn-primary {
  width: 100%; padding: 16px;
  background: var(--blue); color: white;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:active { transform: scale(0.97); opacity: 0.9; }
.btn-green {
  width: 100%; padding: 14px;
  background: var(--green); color: white;
  border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.btn-green:active { transform: scale(0.97); }

/* Modal */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: none; align-items: flex-end; justify-content: center;
}
.overlay.show { display: flex; }
.sheet {
  background: rgba(28,28,30,0.95);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-radius: 24px 24px 0 0;
  width: 100%; max-width: 500px; padding: 24px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-top: 0.5px solid rgba(255,255,255,0.1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
.sheet h2 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-btn {
  flex: 1; padding: 14px; border: none; border-radius: 14px;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.modal-btn:active { transform: scale(0.95); }
.btn-save { background: var(--green); color: white; }
.btn-cancel { background: rgba(255,255,255,0.08); color: var(--t); }
.btn-delete { background: var(--red); color: white; flex: 0.35; }

/* Toast */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 24px;
  font-size: 14px; font-weight: 600;
  opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 200; pointer-events: none; color: white;
  backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: rgba(48,209,88,0.9); box-shadow: 0 4px 20px rgba(48,209,88,0.3); }
.toast.error { background: rgba(255,69,58,0.9); box-shadow: 0 4px 20px rgba(255,69,58,0.3); }

/* Export Button */
.export-row { display: flex; gap: 8px; margin-top: 12px; }
.export-btn {
  flex: 1; padding: 12px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; color: var(--t); font-size: 14px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.export-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.97); }

/* Readiness */
.readiness { text-align: center; padding: 16px; }
.readiness-pct { font-size: 48px; font-weight: 800; letter-spacing: -2px; }
.readiness-lbl { font-size: 13px; color: var(--t2); margin-top: 2px; }
</style></head><body>
<div class="pg on" id="pOv">
<div class="hdr"><h1 id="tripTitle">🚐 Roadtrip</h1><div class="sub" id="subT"></div><div class="sync-dot" id="dot"></div></div>
<div class="glass">
<div class="budget-header">
<div><div class="budget-label">Budget</div><div class="budget-value" id="bB">—</div></div>
<div class="budget-remain"><div class="budget-label">Verbleibend</div><div class="budget-value" id="bR">—</div></div>
</div>
<div class="budget-bar"><div class="budget-fill" id="bBar"></div></div>
<div class="stats-grid">

<div class="stat-card"><div class="stat-val" id="bO">—</div><div class="stat-lbl">Offen</div></div>
<div class="stat-card"><div class="stat-val" id="bC">—</div><div class="stat-lbl">Erledigt</div></div>
<div class="stat-card"><div class="stat-val" id="bReady">—</div><div class="stat-lbl">Fertig</div></div>
</div>
</div>
<div class="readiness glass"><div class="readiness-pct" id="readyPct">—</div><div class="readiness-lbl">Bereitschaft für den Roadtrip</div></div>
<div class="seg"><button class="on" onclick="sf('all',this)">Alle</button><button onclick="sf('Anschaffung',this)">📦 Neu</button><button onclick="sf('Reparatur',this)">🔧 Rep.</button></div>
<div id="ilist"></div>
<div class="add-row"><input type="text" id="addName" placeholder="Neue Position..." onkeydown="if(event.key==='Enter'){document.getElementById('addPrice').focus()}"><input type="number" id="addPrice" placeholder="€" inputmode="decimal" onkeydown="if(event.key==='Enter')quickAdd()"><button class="add-btn" onclick="quickAdd()">+</button></div>

</div>

<div class="pg" id="pT">
<div class="hdr"><h1>✅ Aufgaben</h1><div class="sub" id="tsub"></div></div>
<div class="filter-bar" id="whoBar"></div>
<div id="tlist"></div>
<div class="add-row"><input type="text" id="tIn" placeholder="Neue Aufgabe..." onkeydown="if(event.key==='Enter')addTask()"><button class="add-btn" onclick="addTask()">+</button></div>
</div>

<div class="pg" id="pP">

<div class="tabs">
<div class="tab on" onclick="gt('Ov',this)"><span class="ico">🚐</span>Kosten</div>
<div class="tab" onclick="gt('T',this)"><span class="ico">✅</span>Aufgaben</div>
<div class="tab" onclick="gt('P',this)"><span class="ico">🎒</span>Packen</div>
<div class="tab" onclick="gt('C',this)"><span class="ico">🌍</span>Länder</div>
<div class="tab" onclick="gt('N',this)"><span class="ico">📝</span>Mehr</div>
</div>

<div class="overlay" id="mI"><div class="sheet">
<h2 id="mT">Bearbeiten</h2>
<div class="field"><label>Was?</label><input type="text" id="fN"></div>
<div class="field"><label>Preis (€)</label><input type="number" id="fPr" inputmode="decimal"></div>
<div class="field"><label>Kategorie</label><select class="cat-select" id="fCat"></select></div>
<div class="field"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0"><input type="checkbox" id="fPd" style="width:20px;height:20px;accent-color:var(--green)"> Bereits bezahlt</label></div>
<div class="field"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0"><input type="checkbox" id="fDn" style="width:20px;height:20px;accent-color:var(--green)"> Erledigt / eingebaut</label></div>
<div class="modal-actions"><button class="modal-btn btn-cancel" onclick="cm()">Abbrechen</button><button class="modal-btn btn-delete" id="dBtn" onclick="di()" style="display:none">🗑</button><button class="modal-btn btn-save" onclick="si()">Speichern</button></div>
</div></div>
<div class="overlay" id="mCat"><div class="sheet">
<h2>Neue Kategorie</h2>
<div class="field"><label>Name (mit Emoji!)</label><input type="text" id="newCatName" placeholder="z.B. 🛶 Kajak"></div>
<div class="modal-actions"><button class="modal-btn btn-cancel" onclick="document.getElementById('mCat').classList.remove('show')">Abbrechen</button><button class="modal-btn btn-save" onclick="addNewCat()">Erstellen</button></div>
</div></div>
<div class="toast" id="toast"></div>
<script>
const API="/api/data";let D=null,fil="all",who="all",pkF="all",eid=-1;
const icons={"Tobi":"👨","Pauline":"👩","Noel":"🧒","Raphael":"👶"};
const whoClass={"Tobi":"who-tobi","Pauline":"who-pauline","Noel":"who-noel","Raphael":"who-raphael"};

async function ld(){try{const r=await fetch(API);D=await r.json();dot(true)}catch(e){dot(false);const s=localStorage.getItem("v6");if(s)D=JSON.parse(s)}rn()}
async function sy(){try{await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(D)});localStorage.setItem("v6",JSON.stringify(D));dot(true)}catch(e){localStorage.setItem("v6",JSON.stringify(D));dot(false)}}
function dot(ok){document.getElementById("dot").className="sync-dot "+(ok?"ok":"fail")}
function fm(n){return n.toLocaleString("de-DE",{minimumFractionDigits:0})+" €"}
function es(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function ic(n){return(D.familyIcons&&D.familyIcons[n])||(icons[n]||"👤")}

function rn(){
if(!D)return;
document.getElementById("tripTitle").textContent="🚐 "+(D.tripName||"Roadtrip");
const total=D.items.reduce((s,i)=>s+i.price,0);
const paid=D.items.filter(i=>i.paid).reduce((s,i)=>s+i.price,0);
const done=D.items.filter(i=>i.done).length;
const budget=D.budget||5000,remain=budget-total;
const pct=Math.min(100,(total/budget)*100);
const ready=Math.round((done/Math.max(1,D.items.length))*100);

document.getElementById("bB").textContent=fm(budget);
const rE=document.getElementById("bR");rE.textContent=fm(remain);rE.style.color=remain<0?"var(--red)":"var(--green)";
document.getElementById("bP").textContent=fm(paid);
document.getElementById("bO").textContent=fm(total-paid);
document.getElementById("bC").textContent=done+"/"+D.items.length;
document.getElementById("bReady").textContent=ready+"%";
const readyPct=document.getElementById("readyPct");
readyPct.textContent=ready+"%";
readyPct.style.color=ready>80?"var(--green)":ready>50?"var(--orange)":"var(--red)";

const bar=document.getElementById("bBar");
bar.style.width=pct+"%";
bar.style.background=pct>90?"var(--red)":pct>70?"var(--orange)":"linear-gradient(90deg,var(--green),var(--teal))";
document.getElementById("subT").textContent=D.items.length+" Positionen · "+fm(total)+" gesamt";

const vis=D.items.filter(i=>fil==="all"||i.type===fil);
const cats={};vis.forEach(i=>{if(!cats[i.cat])cats[i.cat]=[];cats[i.cat].push(i)});
let h="";
Object.entries(cats).sort(([a],[b])=>a.localeCompare(b)).forEach(([cat,list])=>{
const ct=list.reduce((s,i)=>s+i.price,0);
h+='<div class="cat-section"><div class="cat-header open" onclick="tc(this)"><span class="cat-name">'+cat+'</span><span><span class="cat-total">'+fm(ct)+'</span><span class="chevron">›</span></span></div><div class="cat-items">';
list.forEach(item=>{const idx=D.items.indexOf(item);
h+='<div class="item-row" onclick="ei('+idx+')"><div class="check-circle '+(item.done?'done':'')+'" onclick="event.stopPropagation();td('+idx+')">'+(item.done?'✓':'')+'</div><div class="item-info"><div class="item-name">'+es(item.name)+'</div><div class="item-meta"><span class="item-badge '+(item.paid?'badge-paid':'badge-open')+'">'+(item.paid?'✅ Bezahlt':'⏳ Offen')+'</span></div></div><div class="item-price '+(item.paid?'':'unpaid')+'">'+fm(item.price)+'</div></div>';
});h+='</div></div>';
});
if(!vis.length)h='<div style="text-align:center;padding:50px 20px;color:var(--t2)"><div style="font-size:56px;margin-bottom:12px">🚐</div><div style="font-size:17px;font-weight:600">Noch keine Einträge</div><div style="font-size:14px;margin-top:4px">Tippe + um zu starten</div></div>';
document.getElementById("ilist").innerHTML=h;

// Cat select
const sel=document.getElementById("addCatSelect");
sel.innerHTML=(D.categories||[]).map(c=>'<option value="'+c+'">'+c+'</option>').join("");

// Tasks
const fam=D.family||[];
let wb='<button class="filter-chip '+(who==="all"?'on':'')+'" onclick="sw(\'all\',this)">Alle</button>';
fam.forEach(f=>{wb+='<button class="filter-chip '+(who===f?'on':'')+'" onclick="sw(\''+f+'\',this)">'+ic(f)+' '+es(f)+'</button>'});
wb+='<button class="filter-chip '+(who===""?'on':'')+'" onclick="sw(\'\',this)">📋 Ohne</button>';
document.getElementById("whoBar").innerHTML=wb;
const tvis=D.tasks.filter(t=>who==="all"||(who===""&&!t.who:t.who===who));
const tdone=tvis.filter(t=>t.done).length;
document.getElementById("tsub").textContent=tdone+"/"+tvis.length+" erledigt";
let th="";
tvis.forEach(task=>{const idx=D.tasks.indexOf(task);
const wc=task.who?(whoClass[task.who]||""):"";
const wo=task.who?'<div class="task-who '+wc+'">'+ic(task.who)+' '+es(task.who)+'</div>':'';
th+='<div class="task-row '+(task.done?'done':'')+'"><div class="check-circle '+(task.done?'done':'')+'" onclick="tt('+idx+')">'+(task.done?'✓':'')+'</div><div class="task-body"><div class="task-text">'+es(task.text)+'</div>'+wo+'</div></div>';
});
document.getElementById("tlist").innerHTML=th||'<div style="text-align:center;padding:40px;color:var(--t2)"><div style="font-size:48px">🎉</div>Alles erledigt!</div>';

rnPk();rnC();
document.getElementById("nArea").value=D.notes||"";
document.getElementById("fBud").value=D.budget||5000;
document.getElementById("fFam").value=(D.family||[]).join(", ");
document.getElementById("fTrip").value=D.tripName||"";
document.getElementById("fCats").value=(D.categories||[]).join("\n");
}

function rnPk(){
if(!D||!D.packlist)return;
const fam=D.family||[];
let fc='<button class="filter-chip '+(pkF==="all"?'on':'')+'" onclick="spk(\'all\',this)">Alle</button>';
fam.forEach(f=>{fc+='<button class="filter-chip '+(pkF===f?'on':'')+'" onclick="spk(\''+f+'\',this)">'+ic(f)+' '+es(f)+'</button>'});
document.getElementById("pkFilter").innerHTML=fc;
let ph="";let tp=0,pp=0;
Object.entries(D.packlist).forEach(([cat,data])=>{
const items=data.items||data;const members=data.members||[];
if(pkF!=="all"&&members.length&&!members.includes(pkF))return;
const pk=items.filter(i=>i.packed).length;tp+=items.length;pp+=pk;
const pct=items.length?Math.round(pk/items.length*100):0;
const mh=members.length?'<div class="pk-members">'+members.map(m=>'<span class="pk-member-tag">'+ic(m)+' '+es(m)+'</span>').join("")+'</div>':'';
ph+='<div class="pk-section"><div class="pk-head"><div><div class="pk-title">'+cat+'</div>'+mh+'</div><span class="pk-count">'+pk+'/'+items.length+'</span></div>';
ph+='<div class="pk-progress"><div class="pk-progress-fill" style="width:'+pct+'%"></div></div>';
items.forEach((item,i)=>{
ph+='<div class="pk-item '+(item.packed?'packed':'')+'"><div class="pk-check '+(item.packed?'on':'')+'" onclick="tpk(\''+cat.replace(/'/g,"\\'")+'\','+i+')">'+(item.packed?'✓':'')+'</div><div class="pk-item-text">'+es(item.text)+'</div></div>';
});
ph+='<div class="add-row" style="margin-top:10px"><input type="text" placeholder="+ Item..." onkeydown="if(event.key==\'Enter\'){addPkItem(this,\''+cat.replace(/'/g,"\\'")+'\')}"><button class="add-btn" onclick="addPkItem(this.previousElementSibling,\''+cat.replace(/'/g,"\\'")+'\')">+</button></div>';
ph+='</div>';
});
document.getElementById("psub").textContent=pp+"/"+tp+" eingepackt · "+Math.round(pp/Math.max(1,tp)*100)+"%";
document.getElementById("plist").innerHTML=ph||'<div style="text-align:center;padding:40px;color:var(--t2)">Noch keine Listen</div>';
}

function rnC(){
if(!D||!D.countries)return;
let h="";
Object.entries(D.countries).forEach(([name,info])=>{
h+='<div class="country-card"><div class="country-name">'+name+'</div>';
h+='<div class="country-row"><div class="country-label">Vignette</div><div class="country-value">'+es(info.vignette||"—")+'</div></div>';
h+='<div class="country-row"><div class="country-label">Umwelt</div><div class="country-value">'+es(info.umwelt||"—")+'</div></div>';
h+='<div class="country-row"><div class="country-label">Notfall</div><div class="country-value emergency">'+es(info.notfall||"—")+'</div></div>';
h+='<div class="country-row"><div class="country-label">Sprache</div><div class="country-value">'+es(info.sprache||"—")+'</div></div>';
h+='</div>';
});
document.getElementById("clist").innerHTML=h;
}

function gt(n,el){document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));document.getElementById("p"+n).classList.add("on");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));el.classList.add("on")}
function sf(f,el){fil=f;document.querySelectorAll("#pOv .seg button").forEach(b=>b.classList.remove("on"));el.classList.add("on");rn()}
function sw(w,el){who=w;document.querySelectorAll(".filter-chip").forEach(b=>b.classList.remove("on"));el.classList.add("on");rn()}
function spk(f,el){pkF=f;document.querySelectorAll(".filter-chip").forEach(b=>b.classList.remove("on"));el.classList.add("on");rnPk()}
function tc(el){el.classList.toggle("open");const items=el.nextElementSibling;if(!el.classList.contains("open")){items.style.maxHeight="0"}else{items.style.maxHeight="none"}}
async function td(idx){D.items[idx].done=!D.items[idx].done;if(D.items[idx].done)D.items[idx].paid=true;await sy();rn()}
async function tt(idx){D.tasks[idx].done=!D.tasks[idx].done;await sy();rn()}
async function tpk(cat,i){D.packlist[cat].items[i].packed=!D.packlist[cat].items[i].packed;await sy();rnPk()}
async function addPkItem(input,cat){const t=input.value.trim();if(!t)return;D.packlist[cat].items.push({text:t,packed:false});input.value="";await sy();rnPk();toast("✓","success")}
async function addPkCat(){const n=document.getElementById("pkNewCat").value.trim();if(!n)return;const m=document.getElementById("pkNewCatMembers").value.split(",").map(s=>s.trim()).filter(Boolean);if(!D.packlist[n])D.packlist[n]={members:m,items:[]};document.getElementById("pkNewCat").value="";document.getElementById("pkNewCatMembers").value="";await sy();rn();toast("✓ "+n,"success")}

function om(idx){eid=typeof idx==="number"?idx:-1;document.getElementById("mT").textContent=eid>=0?"Bearbeiten":"Neue Position";document.getElementById("dBtn").style.display=eid>=0?"":"none";const s=document.getElementById("fCat");s.innerHTML=(D.categories||[]).map(c=>'<option value="'+c+'">'+c+'</option>').join("");if(eid>=0){const i=D.items[eid];document.getElementById("fN").value=i.name;document.getElementById("fPr").value=i.price;s.value=i.cat;document.getElementById("fPd").checked=i.paid;document.getElementById("fDn").checked=i.done}else{document.getElementById("fN").value="";document.getElementById("fPr").value="";document.getElementById("fPd").checked=false;document.getElementById("fDn").checked=false}document.getElementById("mI").classList.add("show");setTimeout(()=>document.getElementById("fN").focus(),350)}
function ei(idx){om(idx)}
function cm(){document.getElementById("mI").classList.remove("show")}
async function si(){const n=document.getElementById("fN").value.trim();if(!n)return;const p=parseFloat(document.getElementById("fPr").value)||0;const c=document.getElementById("fCat").value;const pd=document.getElementById("fPd").checked;const dn=document.getElementById("fDn").checked;const item={name:n,price:p,cat:c,type:"Anschaffung",paid:pd,done:dn};if(eid>=0){item.id=D.items[eid].id;item.type=D.items[eid].type;D.items[eid]=item}else{item.id=D.nextId||(D.nextId=D.items.length+1);D.nextId++;D.items.push(item)}cm();await sy();rn();toast(eid>=0?"✓ Aktualisiert":"✓ Hinzugefügt","success")}
async function di(){if(eid<0)return;if(!confirm('"'+es(D.items[eid].name)+'" löschen?'))return;D.items.splice(eid,1);cm();await sy();rn();toast("🗑 Gelöscht","error")}
async function quickAdd(){const n=document.getElementById("addName").value.trim();if(!n)return;const p=parseFloat(document.getElementById("addPrice").value)||0;const c=document.getElementById("addCatSelect").value||D.categories[0];D.items.push({id:D.nextId||(D.nextId=D.items.length+1),name:n,price:p,cat:c,type:"Anschaffung",paid:false,done:false});D.nextId++;document.getElementById("addName").value="";document.getElementById("addPrice").value="";await sy();rn();toast("✓ "+n,"success")}
function showNewCat(){document.getElementById("mCat").classList.add("show");setTimeout(()=>document.getElementById("newCatName").focus(),350)}
async function addNewCat(){const n=document.getElementById("newCatName").value.trim();if(!n)return;if(!D.categories.includes(n))D.categories.push(n);document.getElementById("newCatName").value="";document.getElementById("mCat").classList.remove("show");await sy();rn();toast("✓ "+n,"success")}
async function addTask(){const t=document.getElementById("tIn").value.trim();if(!t)return;D.tasks.push({id:D.nextTaskId||(D.nextTaskId=D.tasks.length+1),text:t,who:"",done:false});D.nextTaskId=(D.nextTaskId||D.tasks.length)+1;document.getElementById("tIn").value="";await sy();rn();toast("✓","success")}
async function saveNotes(){D.notes=document.getElementById("nArea").value;await sy();toast("💾 Gespeichert","success")}
async function saveSettings(){D.budget=parseFloat(document.getElementById("fBud").value)||5000;D.family=document.getElementById("fFam").value.split(",").map(s=>s.trim()).filter(Boolean);D.tripName=document.getElementById("fTrip").value||"Roadtrip";D.categories=document.getElementById("fCats").value.split("\n").map(s=>s.trim()).filter(Boolean);await sy();rn();toast("✓ Gespeichert","success")}

function exportCSV(){let csv="Position,Preis,Kategorie,Bezahlt,Erledigt\n";D.items.forEach(i=>{csv+='"'+i.name+'",'+i.price+',"'+i.cat+'",'+(i.paid?"Ja":"Nein")+","+(i.done?"Ja":"Nein")+"\n"});csv+="\nGESAMT,"+D.items.reduce((s,i)=>s+i.price,0)+",,,";const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="van-roadtrip-kosten.csv";a.click();toast("📥 CSV heruntergeladen","success")}
function exportJSON(){const b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="van-roadtrip-backup.json";a.click();toast("💾 Backup erstellt","success")}

function toast(m,c){const t=document.getElementById("toast");t.textContent=m;t.className="toast "+c+" show";setTimeout(()=>t.className="toast",2200)}
ld();
</script></body></html>
